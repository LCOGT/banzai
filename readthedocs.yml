version: 2

sphinx:
  configuration: docs/conf.py

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  commands:
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - . $HOME/.local/bin/env && uv sync --extra cpu --extra docs
    - . $HOME/.local/bin/env && uv run sphinx-build -b html docs/ ${READTHEDOCS_OUTPUT}/html/
