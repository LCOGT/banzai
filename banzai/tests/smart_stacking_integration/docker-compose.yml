services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: banzai
      POSTGRES_DB: smartstack_test
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5450:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banzai -d smartstack_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
