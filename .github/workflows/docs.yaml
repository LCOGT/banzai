name: Docs

on:
  pull_request:
    branches:
        - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: '3.12'
          enable-cache: true
      - name: Install pandoc
        run: |
          sudo apt-get update
          sudo apt-get install pandoc
      - name: Set up project
        run: uv sync --locked --extra docs
      - name: Build Docs
        run: uv run sphinx-build -W -b html docs docs/_build/html
