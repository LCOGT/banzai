name: Unit Tests

on:
  pull_request:
    branches:
      - '**'

jobs:
  linuxtest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Set up project
        run: uv sync --extra cpu --extra test
      - name: Run tests
        run: uv run pytest --pyargs banzai.tests -m "not e2e"
  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    steps:
      - uses: actions/checkout@v3
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Set up project
        run: uv sync --extra cpu --extra test
      - name: Run tests
        run: uv run pytest --pyargs banzai.tests -m "not e2e"
