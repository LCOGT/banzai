services:
  postgresql:
    image: postgres:14
    container_name: banzai-postgresql
    ports:
    - "5442:5432"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - POSTGRES_DB=banzai_local
      - POSTGRES_USER=banzai
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - site-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banzai -d banzai_local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  banzai-cache-init:
    build: .
    container_name: banzai-cache-init
    depends_on:
      postgresql:
        condition: service_healthy
    command: ["banzai_cache_init",
              "--db-address=${DB_ADDRESS}",
              "--aws-db-address=${AWS_DB_ADDRESS:-}",
              "--site-id=${SITE_ID}",
              "--publication-name=${PUBLICATION_NAME:-banzai_calibrations}",
              "--slot-name=${SLOT_NAME:-banzai_${SITE_ID}_slot}"]
    restart: "no"

  # NOTE: HOST_*_DIR paths must be absolute. Volumes are mounted at the same
  # path inside the container so that host-absolute file paths resolve as-is.

  banzai-worker:
    build: .
    container_name: banzai-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    volumes:
      - ${HOST_RAW_DIR}:${HOST_RAW_DIR}
      - ${HOST_CALS_DIR}:${HOST_CALS_DIR}
      - ${HOST_REDUCED_DIR}:${HOST_REDUCED_DIR}
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - TASK_HOST=${REDIS_URL}
      - FITS_BROKER=${RABBITMQ_URL}
      - FITS_EXCHANGE=fits_files
      - CELERY_TASK_QUEUE_NAME=reduction_task_queue
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
      - OPENTSDB_PYTHON_METRICS_TEST_MODE=${OPENTSDB_PYTHON_METRICS_TEST_MODE}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATA_ROOT=${HOST_REDUCED_DIR}
    command: ["celery", "-A", "banzai.scheduling", "worker", "--hostname", "banzai-worker-local", "-l", "${BANZAI_WORKER_LOGLEVEL}", "-c", "4", "-Q", "reduction_task_queue"]
    restart: unless-stopped

  banzai-large-worker:
    build: .
    container_name: banzai-large-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    volumes:
      - ${HOST_RAW_DIR}:${HOST_RAW_DIR}
      - ${HOST_CALS_DIR}:${HOST_CALS_DIR}
      - ${HOST_REDUCED_DIR}:${HOST_REDUCED_DIR}
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - TASK_HOST=${REDIS_URL}
      - FITS_BROKER=${RABBITMQ_URL}
      - FITS_EXCHANGE=fits_files
      - CELERY_LARGE_TASK_QUEUE_NAME=large_reduction_task_queue
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
      - OPENTSDB_PYTHON_METRICS_TEST_MODE=${OPENTSDB_PYTHON_METRICS_TEST_MODE}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATA_ROOT=${HOST_REDUCED_DIR}
    command: ["celery", "-A", "banzai.scheduling", "worker", "--hostname", "banzai-large-worker-local", "-l", "${BANZAI_WORKER_LOGLEVEL}", "-c", "4", "-Q", "large_reduction_task_queue"]
    restart: unless-stopped

  banzai-listener:
    build: .
    container_name: banzai-listener
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
      banzai-worker:
        condition: service_started
    volumes:
      - ${HOST_RAW_DIR}:${HOST_RAW_DIR}
      - ${HOST_CALS_DIR}:${HOST_CALS_DIR}
      - ${HOST_REDUCED_DIR}:${HOST_REDUCED_DIR}
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - CELERY_LARGE_TASK_QUEUE_NAME=large_reduction_task_queue
      - CELERY_TASK_QUEUE_NAME=reduction_task_queue
      - TASK_HOST=${REDIS_URL}
      - FITS_EXCHANGE=fits_files
      - OPENTSDB_PYTHON_METRICS_TEST_MODE=${OPENTSDB_PYTHON_METRICS_TEST_MODE}
    entrypoint: ["banzai_run_realtime_pipeline", "--fpack", "--no-bpm",
                 "--broker-url=${RABBITMQ_URL}",
                 "--db-address=${DB_ADDRESS}",
                 "--calibration-db-address=${CAL_DB_ADDRESS}",
                 "--processed-path=${HOST_REDUCED_DIR}"]
    restart: unless-stopped

  banzai-download-worker:
    build: .
    container_name: banzai-download-worker
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    volumes:
      - ${HOST_CALS_DIR}:${HOST_CALS_DIR}
    environment:
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
    command: ["banzai_download_worker",
              "--db-address=${DB_ADDRESS}",
              "--site-id=${SITE_ID}",
              "--instrument-types=${INSTRUMENT_TYPES:-*}",
              "--processed-path=${HOST_CALS_DIR}",
              "--poll-interval=${DOWNLOAD_WORKER_POLL_INTERVAL:-10}"]
    restart: unless-stopped

  banzai-subframe-listener:
    build: .
    container_name: banzai-subframe-listener
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - SUBFRAME_TASK_QUEUE_NAME=subframe_reduction_task_queue
      - TASK_HOST=${REDIS_URL}
      - REDIS_URL=${REDIS_URL}
    command: ["banzai_subframe_worker", "--broker-url=${RABBITMQ_URL}",
              "--db-address=${DB_ADDRESS}", "--rlevel=9",
              "--processed-path=${HOST_REDUCED_DIR}"]
    restart: unless-stopped

  banzai-subframe-worker:
    build: .
    container_name: banzai-subframe-worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    volumes:
      - ${HOST_RAW_DIR}:${HOST_RAW_DIR}
      - ${HOST_CALS_DIR}:${HOST_CALS_DIR}
      - ${HOST_REDUCED_DIR}:${HOST_REDUCED_DIR}
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - TASK_HOST=${REDIS_URL}
      - SUBFRAME_TASK_QUEUE_NAME=subframe_reduction_task_queue
      - REDIS_URL=${REDIS_URL}
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATA_ROOT=${HOST_REDUCED_DIR}
    command: ["celery", "-A", "banzai.scheduling", "worker",
              "--hostname", "banzai-subframe-worker-local",
              "-l", "${BANZAI_WORKER_LOGLEVEL}",
              "-c", "4",
              "-Q", "subframe_reduction_task_queue"]
    restart: unless-stopped

  banzai-stacking-supervisor:
    build: .
    container_name: banzai-stacking-supervisor
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    command: [
      "banzai_stacking_supervisor",
      "--site-id=${SITE_ID}",
      "--db-address=${DB_ADDRESS}",
      "--redis-url=${REDIS_URL}",
      "--stack-timeout-minutes=${STACK_TIMEOUT_MINUTES:-20}",
      "--stack-retention-days=${STACK_RETENTION_DAYS:-30}"
    ]
    restart: unless-stopped

volumes:
  site-pgdata:
