services:
  postgresql:
    image: postgres:14
    container_name: banzai-postgresql
    ports:
    - "5442:5432"
    environment:
      - POSTGRES_DB=banzai_local
      - POSTGRES_USER=banzai
      - POSTGRES_HOST_AUTH_METHOD=trust
    volumes:
      - ${HOST_DATA_DIR}/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U banzai -d banzai_local"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  banzai-cache-init:
    build: .
    container_name: banzai-cache-init
    depends_on:
      postgresql:
        condition: service_healthy
    volumes:
      - ${HOST_DATA_DIR}:/data
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - AWS_DB_ADDRESS=${AWS_DB_ADDRESS:-}
      - SITE_ID=${SITE_ID}
      - INSTRUMENT_TYPES_TO_CACHE=${INSTRUMENT_TYPES_TO_CACHE:-*}
      - CACHE_FILES_ROOT=${CACHE_FILES_ROOT:-/data/calibrations}
      - PUBLICATION_NAME=${PUBLICATION_NAME:-banzai_calibrations}
    command: ["banzai_cache_init"]
    restart: "no"

  redis:
    image: redis:7
    container_name: banzai-redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: banzai-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  banzai-worker:
    build: .
    container_name: banzai-worker
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ${HOST_DATA_DIR}:/data
      - ${HOST_PROCESSED_DIR}:/output
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - TASK_HOST=${TASK_HOST}
      - FITS_BROKER=${FITS_BROKER}
      - FITS_EXCHANGE=${FITS_EXCHANGE}
      - CELERY_TASK_QUEUE_NAME=${CELERY_TASK_QUEUE_NAME}
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
      - OPENTSDB_PYTHON_METRICS_TEST_MODE=${OPENTSDB_PYTHON_METRICS_TEST_MODE}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATA_ROOT=/output
    command: ["celery", "-A", "banzai.scheduling", "worker", "--hostname", "banzai-worker-local", "-l", "${BANZAI_WORKER_LOGLEVEL}", "-c", "4", "-Q", "${CELERY_TASK_QUEUE_NAME}"]
    restart: unless-stopped

  banzai-large-worker:
    build: .
    container_name: banzai-large-worker
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
    volumes:
      - ${HOST_DATA_DIR}:/data
      - ${HOST_PROCESSED_DIR}:/output
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - TASK_HOST=${TASK_HOST}
      - FITS_BROKER=${FITS_BROKER}
      - FITS_EXCHANGE=${FITS_EXCHANGE}
      - CELERY_LARGE_TASK_QUEUE_NAME=${CELERY_LARGE_TASK_QUEUE_NAME}
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - OMP_NUM_THREADS=${OMP_NUM_THREADS}
      - OPENTSDB_PYTHON_METRICS_TEST_MODE=${OPENTSDB_PYTHON_METRICS_TEST_MODE}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DATA_ROOT=/output
    command: ["celery", "-A", "banzai.scheduling", "worker", "--hostname", "banzai-large-worker-local", "-l", "${BANZAI_WORKER_LOGLEVEL}", "-c", "4", "-Q", "${CELERY_LARGE_TASK_QUEUE_NAME}"]
    restart: unless-stopped

  banzai-listener:
    build: .
    container_name: banzai-listener
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      rabbitmq:
        condition: service_started
      banzai-worker:
        condition: service_started
    volumes:
      - ${HOST_DATA_DIR}:/data
      - ${HOST_PROCESSED_DIR}:/output
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CAL_DB_ADDRESS=${CAL_DB_ADDRESS:-${DB_ADDRESS}}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - BANZAI_WORKER_LOGLEVEL=${BANZAI_WORKER_LOGLEVEL}
      - CELERY_LARGE_TASK_QUEUE_NAME=${CELERY_LARGE_TASK_QUEUE_NAME}
      - CELERY_TASK_QUEUE_NAME=${CELERY_TASK_QUEUE_NAME}
      - TASK_HOST=${TASK_HOST}
      - FITS_BROKER_URL=${FITS_BROKER_URL}
      - FITS_EXCHANGE=${FITS_EXCHANGE}
      - OPENTSDB_PYTHON_METRICS_TEST_MODE=${OPENTSDB_PYTHON_METRICS_TEST_MODE}
    entrypoint: ["banzai_run_realtime_pipeline", "--fpack", "--no-bpm",
                 "--broker-url=${FITS_BROKER_URL}",
                 "--db-address=${DB_ADDRESS}",
                 "--calibration-db-address=${CAL_DB_ADDRESS}",
                 "--processed-path=/output"]
    restart: unless-stopped

  banzai-download-worker:
    build: .
    container_name: banzai-download-worker
    depends_on:
      banzai-cache-init:
        condition: service_completed_successfully
    volumes:
      - ${HOST_DATA_DIR}:/data
    environment:
      - DB_ADDRESS=${DB_ADDRESS}
      - CACHE_FILES_ROOT=${CACHE_FILES_ROOT:-/data/calibrations}
      - API_ROOT=${API_ROOT}
      - AUTH_TOKEN=${AUTH_TOKEN}
      - DOWNLOAD_WORKER_POLL_INTERVAL=${DOWNLOAD_WORKER_POLL_INTERVAL:-10}
    command: ["banzai_download_worker"]
    restart: unless-stopped
